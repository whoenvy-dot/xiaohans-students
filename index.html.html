<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>✨ 奇幻思考倒數計時器 ✨</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Font Awesome for cute icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Google Fonts: Playful styles -->
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Mochi动+One&family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
  
  <style>
    body {
      font-family: 'Noto Sans TC', 'Fredoka One', sans-serif;
      background: linear-gradient(135deg, #fef08a 0%, #fbcfe8 50%, #bfdbfe 100%);
      background-size: 400% 400%;
      animation: gradientBG 15s ease infinite;
    }

    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* Cute bubbly styles */
    .bubble-shadow {
      box-shadow: 0 10px 0px 0px rgba(0, 0, 0, 0.05), inset 0 -8px 0px 0px rgba(0, 0, 0, 0.1);
    }
    
    .bubble-btn {
      transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .bubble-btn:hover {
      transform: translateY(-4px) scale(1.03);
    }
    .bubble-btn:active {
      transform: translateY(2px) scale(0.97);
    }

    /* Custom scrollbar for cute look */
    ::-webkit-scrollbar {
      width: 8px;
    }
    ::-webkit-scrollbar-track {
      background: #f1f5f9;
      border-radius: 9999px;
    }
    ::-webkit-scrollbar-thumb {
      background: #fbcfe8;
      border-radius: 9999px;
    }

    /* Floating animation for mascot */
    @keyframes float {
      0%, 100% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(-12px) rotate(2deg); }
    }
    .floating-mascot {
      animation: float 4s ease-in-out infinite;
    }

    /* Sparkle effect */
    @keyframes sparkle {
      0%, 100% { opacity: 0.3; transform: scale(0.8); }
      50% { opacity: 1; transform: scale(1.2); }
    }
    .sparkle-star {
      animation: sparkle 2s infinite;
    }
  </style>
</head>
<body class="min-h-screen flex flex-col justify-between p-4 md:p-6 overflow-x-hidden text-gray-800 selection:bg-pink-200">

  <!-- Floating background decorations -->
  <div class="fixed top-12 left-10 pointer-events-none opacity-20 text-4xl sparkle-star" style="animation-delay: 0s;">✨</div>
  <div class="fixed top-24 right-16 pointer-events-none opacity-20 text-5xl sparkle-star" style="animation-delay: 0.5s;">☁️</div>
  <div class="fixed bottom-24 left-16 pointer-events-none opacity-20 text-5xl sparkle-star" style="animation-delay: 1s;">💡</div>
  <div class="fixed bottom-12 right-12 pointer-events-none opacity-20 text-4xl sparkle-star" style="animation-delay: 1.5s;">🎨</div>

  <!-- Header -->
  <header class="text-center max-w-xl mx-auto mb-2 relative z-10">
    <div class="inline-flex items-center gap-2 bg-white/70 backdrop-blur-md px-6 py-2 rounded-full border-4 border-pink-300 shadow-sm">
      <span class="text-2xl animate-bounce">🎒</span>
      <h1 class="text-xl md:text-2xl font-black text-pink-600 tracking-wider">奇幻思考倒數計時器</h1>
      <span class="text-2xl animate-bounce" style="animation-delay: 0.2s">🌟</span>
    </div>
  </header>

  <!-- Main Work Area -->
  <main class="flex-grow flex flex-col lg:flex-row items-center justify-center gap-6 max-w-6xl w-full mx-auto relative z-10 my-4">
    
    <!-- Left Column: The Big Timer & Mascot -->
    <div class="flex-grow flex flex-col items-center justify-center bg-white/95 border-8 border-pink-200 rounded-3xl p-6 md:p-8 w-full max-w-xl bubble-shadow relative">
      
      <!-- Fullscreen Toggle Button -->
      <button id="fullscreenBtn" class="absolute top-4 right-4 text-pink-400 hover:text-pink-600 transition-colors p-2 text-xl" title="切換全螢幕">
        <i class="fa-solid fa-expand"></i>
      </button>

      <!-- Mascot & Status Display -->
      <div class="h-40 flex items-center justify-center relative w-full mb-4">
        <!-- Thinking Mascot Box -->
        <div class="floating-mascot flex flex-col items-center justify-center">
          <!-- SVG Mascot (Cloud/Bear Hybrid) -->
          <svg id="mascotSvg" class="w-32 h-32 transition-all duration-300" viewBox="0 0 100 100">
            <!-- Cloud Body -->
            <path d="M20,60 C10,60 5,50 15,40 C10,30 25,15 40,25 C50,10 70,10 75,25 C90,15 95,35 85,45 C95,55 85,70 70,65 C65,75 35,75 20,60 Z" fill="#f0fdfa" stroke="#cbd5e1" stroke-width="3"/>
            <!-- Cute Pink Cheeks -->
            <ellipse cx="32" cy="48" rx="5" ry="3" fill="#fda4af"/>
            <ellipse cx="68" cy="48" rx="5" ry="3" fill="#fda4af"/>
            <!-- Eyes (Will change dynamically via JS) -->
            <g id="mascotEyes">
              <!-- Happy/Thinking Eyes default -->
              <path d="M 28 43 Q 32 39 36 43" fill="none" stroke="#334155" stroke-width="3" stroke-linecap="round"/>
              <path d="M 64 43 Q 68 39 72 43" fill="none" stroke="#334155" stroke-width="3" stroke-linecap="round"/>
            </g>
            <!-- Mouth (Will change dynamically via JS) -->
            <path id="mascotMouth" d="M 46 52 Q 50 56 54 52" fill="none" stroke="#334155" stroke-width="3" stroke-linecap="round"/>
            <!-- Spark / Lightbulb (Absolute Position Reference) -->
            <g id="bulbSpark" class="hidden opacity-0 transition-opacity duration-300">
              <path d="M 50 10 L 50 0 M 35 15 L 25 5 M 65 15 L 75 5" stroke="#facc15" stroke-width="3" stroke-linecap="round"/>
              <circle cx="50" cy="15" r="5" fill="#facc15"/>
            </g>
          </svg>
          <div id="mascotBubble" class="absolute -top-4 -right-2 bg-yellow-100 border-2 border-yellow-300 text-yellow-700 text-xs font-bold px-3 py-1 rounded-full shadow-sm max-w-[150px] text-center hidden">
            我想一下...💡
          </div>
        </div>
      </div>

      <!-- Time Display Wrapper with Circular SVG Progress -->
      <div class="relative w-64 h-64 md:w-72 md:h-72 flex items-center justify-center mb-6">
        <!-- Circular Progress Ring SVG -->
        <svg class="absolute inset-0 w-full h-full -rotate-90">
          <!-- Background circle -->
          <circle cx="50%" cy="50%" r="45%" stroke="#f1f5f9" stroke-width="12" fill="transparent" />
          <!-- Active countdown circle -->
          <circle id="progressCircle" cx="50%" cy="50%" r="45%" stroke="#ec4899" stroke-width="12" fill="transparent" 
                  stroke-dasharray="800" stroke-dashoffset="0" stroke-linecap="round" class="transition-all duration-200" />
        </svg>

        <!-- Big Bold Digital Numbers -->
        <div class="text-center z-10 flex flex-col justify-center items-center">
          <div id="timerDisplay" class="text-5xl md:text-6xl font-black text-gray-800 tracking-tight font-mono select-none">
            05:00
          </div>
          <span id="timerStatusLabel" class="text-xs font-bold uppercase tracking-widest text-pink-500 mt-2 bg-pink-50 px-3 py-1 rounded-full border border-pink-200">
            預備思考中
          </span>
        </div>
      </div>

      <!-- Main Controls -->
      <div class="flex flex-wrap gap-4 items-center justify-center w-full">
        <!-- Reset Btn -->
        <button id="resetBtn" class="bubble-btn bubble-shadow bg-amber-400 hover:bg-amber-500 text-white font-bold py-3 px-6 rounded-2xl border-b-4 border-amber-600 flex items-center gap-2">
          <i class="fa-solid fa-rotate-right"></i> 重設
        </button>

        <!-- Play/Pause Btn -->
        <button id="playPauseBtn" class="bubble-btn bubble-shadow bg-emerald-400 hover:bg-emerald-500 text-white font-black py-4 px-10 rounded-2xl border-b-4 border-emerald-600 flex items-center gap-2 text-lg">
          <i id="playIcon" class="fa-solid fa-play"></i> <span id="playText">開始思考</span>
        </button>

        <!-- Mute Toggle -->
        <button id="soundToggleBtn" class="bubble-btn bubble-shadow bg-blue-400 hover:bg-blue-500 text-white font-bold py-3 px-4 rounded-2xl border-b-4 border-blue-600">
          <i id="soundIcon" class="fa-solid fa-volume-high"></i>
        </button>
      </div>

    </div>

    <!-- Right Column: Settings & Presets & Encouraging Quote -->
    <div class="flex-grow flex flex-col gap-4 w-full max-w-md">
      
      <!-- Preset Times Section -->
      <div class="bg-white/95 border-8 border-blue-200 rounded-3xl p-5 bubble-shadow">
        <h3 class="font-black text-blue-600 mb-3 flex items-center gap-2 text-base">
          <span class="text-xl">⏱️</span> 快速選擇時間 (課堂專用)
        </h3>
        <div class="grid grid-cols-4 gap-2">
          <button class="preset-btn bubble-btn bg-pink-100 hover:bg-pink-200 text-pink-700 font-bold py-2 rounded-xl text-sm border-2 border-pink-200" data-seconds="30">30 秒</button>
          <button class="preset-btn bubble-btn bg-blue-100 hover:bg-blue-200 text-blue-700 font-bold py-2 rounded-xl text-sm border-2 border-blue-200" data-seconds="60">1 分鐘</button>
          <button class="preset-btn bubble-btn bg-purple-100 hover:bg-purple-200 text-purple-700 font-bold py-2 rounded-xl text-sm border-2 border-purple-200" data-seconds="180">3 分鐘</button>
          <button class="preset-btn bubble-btn bg-green-100 hover:bg-green-200 text-green-700 font-bold py-2 rounded-xl text-sm border-2 border-green-200" data-seconds="300">5 分鐘</button>
          <button class="preset-btn bubble-btn bg-yellow-100 hover:bg-yellow-200 text-yellow-700 font-bold py-2 rounded-xl text-sm border-2 border-yellow-200" data-seconds="600">10 分鐘</button>
          <button class="preset-btn bubble-btn bg-orange-100 hover:bg-orange-200 text-orange-700 font-bold py-2 rounded-xl text-sm border-2 border-orange-200" data-seconds="900">15 分鐘</button>
          <button class="preset-btn bubble-btn bg-emerald-100 hover:bg-emerald-200 text-emerald-700 font-bold py-2 rounded-xl text-sm border-2 border-emerald-200" data-seconds="1200">20 分鐘</button>
          <button class="preset-btn bubble-btn bg-red-100 hover:bg-red-200 text-red-700 font-bold py-2 rounded-xl text-sm border-2 border-red-200" data-seconds="1800">30 分鐘</button>
        </div>
      </div>

      <!-- Time Customizer Settings -->
      <div class="bg-white/95 border-8 border-purple-200 rounded-3xl p-5 bubble-shadow">
        <h3 class="font-black text-purple-600 mb-3 flex items-center gap-2 text-base">
          <span class="text-xl">⚙️</span> 自由調整時間
        </h3>
        
        <!-- Interactive Inputs Row -->
        <div class="flex items-center justify-around gap-2 mb-4 bg-purple-50 p-3 rounded-2xl border-2 border-purple-100">
          <!-- Hours Input -->
          <div class="text-center">
            <label class="block text-xs font-bold text-purple-500 mb-1">小時</label>
            <div class="flex items-center gap-1">
              <button onclick="adjustInput('inputHours', -1)" class="w-8 h-8 rounded-full bg-white hover:bg-purple-200 text-purple-700 font-black border border-purple-300 shadow-sm">-</button>
              <input type="number" id="inputHours" min="0" max="23" value="0" class="w-12 text-center font-bold bg-white text-gray-800 text-lg rounded-md border border-purple-300 py-1 focus:outline-none focus:border-purple-500">
              <button onclick="adjustInput('inputHours', 1)" class="w-8 h-8 rounded-full bg-white hover:bg-purple-200 text-purple-700 font-black border border-purple-300 shadow-sm">+</button>
            </div>
          </div>
          <span class="font-bold text-purple-400 mt-4">:</span>
          <!-- Minutes Input -->
          <div class="text-center">
            <label class="block text-xs font-bold text-purple-500 mb-1">分鐘</label>
            <div class="flex items-center gap-1">
              <button onclick="adjustInput('inputMinutes', -1)" class="w-8 h-8 rounded-full bg-white hover:bg-purple-200 text-purple-700 font-black border border-purple-300 shadow-sm">-</button>
              <input type="number" id="inputMinutes" min="0" max="59" value="5" class="w-12 text-center font-bold bg-white text-gray-800 text-lg rounded-md border border-purple-300 py-1 focus:outline-none focus:border-purple-500">
              <button onclick="adjustInput('inputMinutes', 1)" class="w-8 h-8 rounded-full bg-white hover:bg-purple-200 text-purple-700 font-black border border-purple-300 shadow-sm">+</button>
            </div>
          </div>
          <span class="font-bold text-purple-400 mt-4">:</span>
          <!-- Seconds Input -->
          <div class="text-center">
            <label class="block text-xs font-bold text-purple-500 mb-1">秒鐘</label>
            <div class="flex items-center gap-1">
              <button onclick="adjustInput('inputSeconds', -1)" class="w-8 h-8 rounded-full bg-white hover:bg-purple-200 text-purple-700 font-black border border-purple-300 shadow-sm">-</button>
              <input type="number" id="inputSeconds" min="0" max="59" value="0" class="w-12 text-center font-bold bg-white text-gray-800 text-lg rounded-md border border-purple-300 py-1 focus:outline-none focus:border-purple-500">
              <button onclick="adjustInput('inputSeconds', 1)" class="w-8 h-8 rounded-full bg-white hover:bg-purple-200 text-purple-700 font-black border border-purple-300 shadow-sm">+</button>
            </div>
          </div>
        </div>

        <!-- Alert Sound Settings -->
        <div class="flex items-center justify-between text-sm">
          <span class="font-black text-purple-500"><i class="fa-solid fa-music"></i> 結束鈴聲類型:</span>
          <select id="bellSelect" class="bg-white border-2 border-purple-200 rounded-xl px-3 py-1 font-bold text-purple-700 focus:outline-none focus:border-purple-500">
            <option value="chime">🔔 水晶鐘聲 (溫和)</option>
            <option value="success">🎉 歡樂慶典 (輕快)</option>
            <option value="alarm">⏰ 叮咚叮咚 (提醒)</option>
          </select>
        </div>
      </div>

      <!-- Encouraging Thought (Quote Bubble) -->
      <div id="quoteCard" class="bg-white/95 border-8 border-amber-200 rounded-3xl p-5 bubble-shadow flex-grow flex flex-col justify-between transition-all duration-300 relative overflow-hidden">
        <!-- Floating light bulb inside quote card -->
        <span class="absolute right-3 top-3 text-amber-300 text-2xl animate-pulse">💡</span>
        <div>
          <h4 class="font-black text-amber-600 mb-2 flex items-center gap-2 text-sm">
            <span>✨</span> 思考能量補充站
          </h4>
          <p id="quoteText" class="text-base font-bold text-gray-700 leading-relaxed min-h-[4.5rem]">
            「思索的過程就像一場精彩的冒險，每一步嘗試都有令人驚喜的新發現！」
          </p>
        </div>
        <div class="flex items-center justify-between border-t border-amber-100 pt-3 mt-3 text-xs text-amber-600 font-bold">
          <span>加油！老師相信你可以的</span>
          <button id="nextQuoteBtn" class="bg-amber-100 hover:bg-amber-200 px-3 py-1 rounded-full flex items-center gap-1 transition-colors">
            換一檔思考能量 <i class="fa-solid fa-chevron-right text-[10px]"></i>
          </button>
        </div>
      </div>

    </div>
  </main>

  <!-- Canvas for Confetti Fireworks (Hidden by default) -->
  <canvas id="confettiCanvas" class="fixed inset-0 w-full h-full pointer-events-none z-50 hidden"></canvas>

  <!-- Custom Alert Toast (Instead of alert()) -->
  <div id="toastNotification" class="fixed bottom-6 left-1/2 -translate-x-1/2 bg-pink-500 text-white font-bold px-6 py-3 rounded-full shadow-2xl z-50 flex items-center gap-2 transform translate-y-24 opacity-0 transition-all duration-300 pointer-events-none">
    <span class="text-xl">🏆</span>
    <span id="toastMessage">時間到囉！大家辛苦了！</span>
  </div>

  <!-- Footer -->
  <footer class="text-center text-xs font-bold text-slate-500 mt-2">
    <div>🎨 讓思考成為一種超能力！點擊各個按鈕探索驚喜音效吧～</div>
  </footer>

  <script>
    // --- State Variables ---
    let totalSeconds = 300; // Default 5 minutes
    let remainingSeconds = 300;
    let timerInterval = null;
    let isPaused = true;
    let isSoundMuted = false;

    // --- Interactive Encouraging Quotes Array ---
    const thoughtsAndQuotes = [
      "思索的過程就像一場精彩的冒險，每一步嘗試都有令人驚喜的新發現！",
      "不要害怕想錯喔！勇敢試錯才是最快學會、最棒的超能力！",
      "你的腦袋正在做體操喔！每想一秒鐘，細胞都在開心地變強壯！",
      "這個問題可能需要一點魔法——那就是你的耐心與專注力！✨",
      "想不通時就深呼吸一下。慢慢來，最厲害的靈感往往就在下一秒！",
      "老師最喜歡看你認真思考的眼神，那比任何星星都要閃亮！",
      "所有的偉大發現，一開始都源自於一個『為什麼』。大膽提問吧！",
      "就像拼圖一樣，一塊一塊慢慢拼，答案自然就會拼好囉！🧩",
      "你的腦海裡藏著一整座無限創意的森林，快進去探險看看吧！🌲",
      "每一個問號，都是通往知識寶藏的神秘地圖喔！🗺️",
      "即使這次沒有成功，你也收穫了非常棒的『經驗金幣』！🪙",
      "只要你開始動腦筋，你就已經比前一分鐘的自己更聰明了！"
    ];

    // --- Web Audio Synthesizer (Cute SFX) ---
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function playCuteSfx(type) {
      if (isSoundMuted) return;
      if (audioCtx.state === 'suspended') {
        audioCtx.resume();
      }

      const now = audioCtx.currentTime;

      if (type === 'tick') {
        // Cute little woodblock tick
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);

        osc.type = 'triangle';
        osc.frequency.setValueAtTime(1200, now);
        osc.frequency.exponentialRampToValueAtTime(800, now + 0.05);

        gain.gain.setValueAtTime(0.05, now);
        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.05);

        osc.start(now);
        osc.stop(now + 0.05);
      } 
      else if (type === 'click') {
        // Soft bubble click
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);

        osc.type = 'sine';
        osc.frequency.setValueAtTime(800, now);
        osc.frequency.exponentialRampToValueAtTime(1500, now + 0.08);

        gain.gain.setValueAtTime(0.1, now);
        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.08);

        osc.start(now);
        osc.stop(now + 0.08);
      }
      else if (type === 'chime') {
        // Gentle crystals/bell chime
        const notes = [523.25, 659.25, 783.99, 1046.50]; // C5, E5, G5, C6
        notes.forEach((freq, index) => {
          const osc = audioCtx.createOscillator();
          const gain = audioCtx.createGain();
          osc.connect(gain);
          gain.connect(audioCtx.destination);

          osc.type = 'sine';
          osc.frequency.setValueAtTime(freq, now + index * 0.15);
          
          gain.gain.setValueAtTime(0.15, now + index * 0.15);
          gain.gain.exponentialRampToValueAtTime(0.01, now + index * 0.15 + 0.8);

          osc.start(now + index * 0.15);
          osc.stop(now + index * 0.15 + 0.9);
        });
      }
      else if (type === 'success') {
        // Upward energetic celebratory fanfare
        const fanfareNotes = [261.63, 329.63, 392.00, 523.25, 659.25, 783.99, 1046.50]; // C4 to C6 rapid
        fanfareNotes.forEach((freq, index) => {
          const osc = audioCtx.createOscillator();
          const gain = audioCtx.createGain();
          osc.connect(gain);
          gain.connect(audioCtx.destination);

          osc.type = 'triangle';
          osc.frequency.setValueAtTime(freq, now + index * 0.08);
          
          gain.gain.setValueAtTime(0.12, now + index * 0.08);
          gain.gain.exponentialRampToValueAtTime(0.01, now + index * 0.08 + 0.3);

          osc.start(now + index * 0.08);
          osc.stop(now + index * 0.08 + 0.35);
        });
      }
      else if (type === 'alarm') {
        // Friendly alarm (Ding dong)
        const playDingDong = (timeOffset, baseFreq) => {
          const osc1 = audioCtx.createOscillator();
          const osc2 = audioCtx.createOscillator();
          const gain = audioCtx.createGain();
          
          osc1.connect(gain);
          osc2.connect(gain);
          gain.connect(audioCtx.destination);

          osc1.type = 'sine';
          osc2.type = 'triangle';
          
          osc1.frequency.setValueAtTime(baseFreq, now + timeOffset);
          osc2.frequency.setValueAtTime(baseFreq * 1.5, now + timeOffset);

          gain.gain.setValueAtTime(0.1, now + timeOffset);
          gain.gain.exponentialRampToValueAtTime(0.01, now + timeOffset + 0.5);

          osc1.start(now + timeOffset);
          osc2.start(now + timeOffset);
          osc1.stop(now + timeOffset + 0.6);
          osc2.stop(now + timeOffset + 0.6);
        };

        playDingDong(0, 600);   // Ding
        playDingDong(0.3, 450); // Dong
      }
    }

    // --- Dom Elements ---
    const timerDisplay = document.getElementById('timerDisplay');
    const timerStatusLabel = document.getElementById('timerStatusLabel');
    const playPauseBtn = document.getElementById('playPauseBtn');
    const playIcon = document.getElementById('playIcon');
    const playText = document.getElementById('playText');
    const resetBtn = document.getElementById('resetBtn');
    const soundToggleBtn = document.getElementById('soundToggleBtn');
    const soundIcon = document.getElementById('soundIcon');
    const progressCircle = document.getElementById('progressCircle');
    const presetBtns = document.querySelectorAll('.preset-btn');
    const bellSelect = document.getElementById('bellSelect');
    const quoteText = document.getElementById('quoteText');
    const nextQuoteBtn = document.getElementById('nextQuoteBtn');
    
    // Custom settings inputs
    const inputHours = document.getElementById('inputHours');
    const inputMinutes = document.getElementById('inputMinutes');
    const inputSeconds = document.getElementById('inputSeconds');

    // Mascot Elements
    const mascotSvg = document.getElementById('mascotSvg');
    const mascotEyes = document.getElementById('mascotEyes');
    const mascotMouth = document.getElementById('mascotMouth');
    const bulbSpark = document.getElementById('bulbSpark');
    const mascotBubble = document.getElementById('mascotBubble');

    // Confetti Setup
    const canvas = document.getElementById('confettiCanvas');
    const ctx = canvas.getContext('2d');
    let confettiActive = false;
    let particles = [];

    // --- Helper Functions ---

    // Zero padding helper
    function pad(num) {
      return num.toString().padStart(2, '0');
    }

    // Input adjustment helper
    window.adjustInput = function(inputId, amount) {
      playCuteSfx('click');
      const input = document.getElementById(inputId);
      let value = parseInt(input.value) || 0;
      value += amount;

      if (inputId === 'inputHours' && value < 0) value = 23;
      if (inputId === 'inputHours' && value > 23) value = 0;
      if ((inputId === 'inputMinutes' || inputId === 'inputSeconds') && value < 0) value = 59;
      if ((inputId === 'inputMinutes' || inputId === 'inputSeconds') && value > 59) value = 0;

      input.value = value;
      updateTotalSecondsFromInputs();
    }

    // Extract setting inputs and update timer
    function updateTotalSecondsFromInputs() {
      const h = parseInt(inputHours.value) || 0;
      const m = parseInt(inputMinutes.value) || 0;
      const s = parseInt(inputSeconds.value) || 0;
      
      const newTotal = (h * 3600) + (m * 60) + s;
      if (newTotal > 0 && isPaused) {
        totalSeconds = newTotal;
        remainingSeconds = newTotal;
        updateDisplay();
      }
    }

    // Handle Input Changes Directly
    [inputHours, inputMinutes, inputSeconds].forEach(input => {
      input.addEventListener('change', () => {
        let val = parseInt(input.value) || 0;
        if (val < 0) val = 0;
        if (input.id !== 'inputHours' && val > 59) val = 59;
        if (input.id === 'inputHours' && val > 23) val = 23;
        input.value = val;
        updateTotalSecondsFromInputs();
      });
    });

    // Update digital text & radial progress bar
    function updateDisplay() {
      const h = Math.floor(remainingSeconds / 3600);
      const m = Math.floor((remainingSeconds % 3600) / 60);
      const s = remainingSeconds % 60;

      let displayStr = "";
      if (h > 0) {
        displayStr = `${pad(h)}:${pad(m)}:${pad(s)}`;
      } else {
        displayStr = `${pad(m)}:${pad(s)}`;
      }
      timerDisplay.textContent = displayStr;

      // Update Circle Progress Bar
      const circleCircumference = 2 * Math.PI * (45 / 100 * timerDisplay.parentElement.parentElement.clientWidth);
      progressCircle.style.strokeDasharray = circleCircumference;
      
      const progressFraction = remainingSeconds / totalSeconds;
      const offset = circleCircumference * (1 - progressFraction);
      progressCircle.style.strokeDashoffset = isNaN(offset) ? 0 : offset;

      // Color coding progress bar based on urgency
      if (progressFraction > 0.5) {
        progressCircle.setAttribute('stroke', '#10b981'); // Emerald
      } else if (progressFraction > 0.15) {
        progressCircle.setAttribute('stroke', '#fbbf24'); // Amber
      } else {
        progressCircle.setAttribute('stroke', '#ef4444'); // Red
      }
    }

    // Sync input sliders to current remaining duration (when idle/reset)
    function syncInputBoxesToTime(seconds) {
      const h = Math.floor(seconds / 3600);
      const m = Math.floor((seconds % 3600) / 60);
      const s = seconds % 60;
      inputHours.value = h;
      inputMinutes.value = m;
      inputSeconds.value = s;
    }

    // Switch mascot appearance based on mode
    function setMascotEmotion(emotion) {
      if (emotion === 'thinking') {
        // Thinking eyes, thinking bubble active
        mascotEyes.innerHTML = `
          <path d="M 28 43 Q 32 39 36 43" fill="none" stroke="#334155" stroke-width="3" stroke-linecap="round"/>
          <path d="M 64 43 Q 68 39 72 43" fill="none" stroke="#334155" stroke-width="3" stroke-linecap="round"/>
        `;
        mascotMouth.setAttribute('d', 'M 46 54 L 54 54'); // straight pondering mouth
        bulbSpark.classList.remove('hidden');
        bulbSpark.classList.remove('opacity-0');
        bulbSpark.classList.add('opacity-100');
        mascotBubble.classList.remove('hidden');
        mascotBubble.textContent = "認真動腦中...🌟";
      } 
      else if (emotion === 'cheering') {
        // Cheering super happy eyes, excited mouth
        mascotEyes.innerHTML = `
          <path d="M 26 44 L 32 38 L 38 44" fill="none" stroke="#e11d48" stroke-width="4" stroke-linecap="round"/>
          <path d="M 62 44 L 68 38 L 74 44" fill="none" stroke="#e11d48" stroke-width="4" stroke-linecap="round"/>
        `;
        mascotMouth.setAttribute('d', 'M 44 52 Q 50 62 56 52 Z'); // big open mouth smiling
        mascotMouth.setAttribute('fill', '#e11d48');
        bulbSpark.classList.add('hidden');
        mascotBubble.classList.remove('hidden');
        mascotBubble.textContent = "太厲害了！🎉";
      } 
      else if (emotion === 'paused') {
        // Surprised/curious expression
        mascotEyes.innerHTML = `
          <circle cx="32" cy="43" r="3" fill="#334155"/>
          <circle cx="68" cy="43" r="3" fill="#334155"/>
        `;
        mascotMouth.setAttribute('d', 'M 47 52 Q 50 49 53 52'); // curved smile
        mascotMouth.setAttribute('fill', 'none');
        bulbSpark.classList.add('hidden');
        mascotBubble.classList.remove('hidden');
        mascotBubble.textContent = "休息一下！🌸";
      } 
      else {
        // Idle friendly
        mascotEyes.innerHTML = `
          <ellipse cx="32" cy="43" rx="3.5" ry="5.5" fill="#334155"/>
          <ellipse cx="68" cy="43" rx="3.5" ry="5.5" fill="#334155"/>
        `;
        mascotMouth.setAttribute('d', 'M 45 52 Q 50 58 55 52'); // cheerful smile
        mascotMouth.setAttribute('fill', 'none');
        bulbSpark.classList.add('hidden');
        mascotBubble.classList.add('hidden');
      }
    }

    // Toast/Alert Trigger
    function triggerToast(message) {
      const toast = document.getElementById('toastNotification');
      document.getElementById('toastMessage').textContent = message;
      
      toast.classList.remove('translate-y-24', 'opacity-0');
      toast.classList.add('translate-y-0', 'opacity-100');

      setTimeout(() => {
        toast.classList.remove('translate-y-0', 'opacity-100');
        toast.classList.add('translate-y-24', 'opacity-0');
      }, 5000);
    }

    // Rotate Quote Content
    function rotateQuote() {
      const currentIndex = thoughtsAndQuotes.indexOf(quoteText.textContent.trim().slice(1, -1));
      let nextIndex = Math.floor(Math.random() * thoughtsAndQuotes.length);
      
      // Ensure we don't pick the same quote consecutive times
      while (nextIndex === currentIndex) {
        nextIndex = Math.floor(Math.random() * thoughtsAndQuotes.length);
      }

      // Add a small cute scale transition
      quoteText.parentElement.classList.add('scale-95', 'opacity-50');
      setTimeout(() => {
        quoteText.textContent = `「${thoughtsAndQuotes[nextIndex]}」`;
        quoteText.parentElement.classList.remove('scale-95', 'opacity-50');
      }, 150);
    }

    // --- Core Timer Controls ---

    function startTimer() {
      if (remainingSeconds <= 0) return;
      
      isPaused = false;
      timerStatusLabel.textContent = "腦力全開倒數中";
      timerStatusLabel.classList.remove('bg-pink-50', 'text-pink-500');
      timerStatusLabel.classList.add('bg-emerald-500', 'text-white', 'animate-pulse');

      playIcon.className = "fa-solid fa-pause";
      playText.textContent = "暫停一下";
      playPauseBtn.className = "bubble-btn bubble-shadow bg-amber-400 hover:bg-amber-500 text-white font-black py-4 px-10 rounded-2xl border-b-4 border-amber-600 flex items-center gap-2 text-lg";

      setMascotEmotion('thinking');

      timerInterval = setInterval(() => {
        if (remainingSeconds > 1) {
          remainingSeconds--;
          updateDisplay();
          // Gentle sound on last 5 seconds to build excitement softly
          if (remainingSeconds <= 5) {
            playCuteSfx('tick');
          }
        } else {
          remainingSeconds = 0;
          updateDisplay();
          timerFinished();
        }
      }, 1000);
    }

    function pauseTimer() {
      isPaused = true;
      clearInterval(timerInterval);
      
      timerStatusLabel.textContent = "思考暫停中";
      timerStatusLabel.classList.remove('bg-emerald-500', 'text-white', 'animate-pulse');
      timerStatusLabel.classList.add('bg-pink-50', 'text-pink-500');

      playIcon.className = "fa-solid fa-play";
      playText.textContent = "繼續思考";
      playPauseBtn.className = "bubble-btn bubble-shadow bg-emerald-400 hover:bg-emerald-500 text-white font-black py-4 px-10 rounded-2xl border-b-4 border-emerald-600 flex items-center gap-2 text-lg";

      setMascotEmotion('paused');
    }

    function timerFinished() {
      isPaused = true;
      clearInterval(timerInterval);

      // Play finished bell tone
      const selectedBell = bellSelect.value;
      playCuteSfx(selectedBell);

      // UI updates
      timerStatusLabel.textContent = "🌟 思考挑戰成功 🌟";
      timerStatusLabel.classList.remove('bg-emerald-500', 'text-white', 'animate-pulse');
      timerStatusLabel.classList.add('bg-yellow-400', 'text-amber-900', 'font-black');

      playIcon.className = "fa-solid fa-play";
      playText.textContent = "重新開始";
      playPauseBtn.className = "bubble-btn bubble-shadow bg-emerald-400 hover:bg-emerald-500 text-white font-black py-4 px-10 rounded-2xl border-b-4 border-emerald-600 flex items-center gap-2 text-lg";

      setMascotEmotion('cheering');
      triggerToast("嗶嗶！時間到囉！每個人都非常棒，思考挑戰大成功！🏆");

      // Celebrate with colorful confetti!
      startConfetti();
    }

    function resetTimer() {
      isPaused = true;
      clearInterval(timerInterval);
      remainingSeconds = totalSeconds;
      
      timerStatusLabel.textContent = "預備思考中";
      timerStatusLabel.className = "text-xs font-bold uppercase tracking-widest text-pink-500 mt-2 bg-pink-50 px-3 py-1 rounded-full border border-pink-200";

      playIcon.className = "fa-solid fa-play";
      playText.textContent = "開始思考";
      playPauseBtn.className = "bubble-btn bubble-shadow bg-emerald-400 hover:bg-emerald-500 text-white font-black py-4 px-10 rounded-2xl border-b-4 border-emerald-600 flex items-center gap-2 text-lg";

      setMascotEmotion('idle');
      updateDisplay();
      stopConfetti();
    }

    // --- Interactive Handlers ---

    // Play/Pause toggler
    playPauseBtn.addEventListener('click', () => {
      playCuteSfx('click');
      if (isPaused) {
        startTimer();
      } else {
        pauseTimer();
      }
    });

    // Reset button
    resetBtn.addEventListener('click', () => {
      playCuteSfx('click');
      resetTimer();
    });

    // Sound Toggle Mute
    soundToggleBtn.addEventListener('click', () => {
      isSoundMuted = !isSoundMuted;
      if (isSoundMuted) {
        soundIcon.className = "fa-solid fa-volume-xmark";
        soundToggleBtn.classList.remove('bg-blue-400', 'border-blue-600', 'hover:bg-blue-500');
        soundToggleBtn.classList.add('bg-rose-400', 'border-rose-600', 'hover:bg-rose-500');
      } else {
        soundIcon.className = "fa-solid fa-volume-high";
        soundToggleBtn.classList.remove('bg-rose-400', 'border-rose-600', 'hover:bg-rose-500');
        soundToggleBtn.classList.add('bg-blue-400', 'border-blue-600', 'hover:bg-blue-500');
        // Play quick sample
        playCuteSfx('click');
      }
    });

    // Preset Selection
    presetBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        playCuteSfx('click');
        const seconds = parseInt(btn.getAttribute('data-seconds'));
        totalSeconds = seconds;
        remainingSeconds = seconds;
        syncInputBoxesToTime(seconds);
        resetTimer();
      });
    });

    // Quote cycle button
    nextQuoteBtn.addEventListener('click', () => {
      playCuteSfx('click');
      rotateQuote();
    });

    // Change quote randomly on initial load
    rotateQuote();

    // Auto rotate quote every 45 seconds to keep it lively
    setInterval(() => {
      if (isPaused) rotateQuote();
    }, 45000);


    // --- Confetti Engine ---

    function startConfetti() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      canvas.classList.remove('hidden');
      confettiActive = true;
      particles = [];

      // Generate 150 confetti items
      for (let i = 0; i < 150; i++) {
        particles.push({
          x: Math.random() * canvas.width,
          y: Math.random() * canvas.height - canvas.height,
          size: Math.random() * 8 + 6,
          color: `hsl(${Math.random() * 360}, 90%, 65%)`,
          speed: Math.random() * 4 + 4,
          angle: Math.random() * 360,
          rotationSpeed: Math.random() * 4 - 2
        });
      }
      requestAnimationFrame(updateConfetti);
    }

    function updateConfetti() {
      if (!confettiActive) return;
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      let finished = true;
      particles.forEach(p => {
        p.y += p.speed;
        p.angle += p.rotationSpeed;
        
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(p.angle * Math.PI / 180);
        ctx.fillStyle = p.color;
        ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size);
        ctx.restore();

        // Keep running until off screen
        if (p.y < canvas.height) {
          finished = false;
        }
      });

      if (!finished) {
        requestAnimationFrame(updateConfetti);
      } else {
        stopConfetti();
      }
    }

    function stopConfetti() {
      confettiActive = false;
      canvas.classList.add('hidden');
      ctx.clearRect(0, 0, canvas.width, canvas.height);
    }

    // Resize canvas on resize
    window.addEventListener('resize', () => {
      if (confettiActive) {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      }
      updateDisplay(); // recalculate circular progress bounds
    });

    // --- Fullscreen Action ---
    const fullscreenBtn = document.getElementById('fullscreenBtn');
    fullscreenBtn.addEventListener('click', () => {
      playCuteSfx('click');
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen().catch(err => {
          triggerToast(`無法啟動全螢幕模式: ${err.message}`);
        });
        fullscreenBtn.innerHTML = '<i class="fa-solid fa-compress"></i>';
      } else {
        document.exitFullscreen();
        fullscreenBtn.innerHTML = '<i class="fa-solid fa-expand"></i>';
      }
    });

    // Initial Display Setup
    updateDisplay();
  </script>
</body>
